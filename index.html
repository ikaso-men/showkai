
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>かたやまの自己紹介</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            margin: 50px auto;
            padding: 30px;
            width: 80%;
            max-width: 600px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        p {
            font-size: 18px;
        }
        .highlight {
            color: #e67e22;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>こんにちは！かたやまです 👋</h1>
    <p><span class="highlight">名前：</span>かたやま</p>
    <p><span class="highlight">住んでいる場所：</span>地球</p>
    <p><span class="highlight">好きなもの：</span>らーめん</p>
    <p><span class="highlight">ひとこと：</span>よろしくお願いします！</p>
</div>

</body>
</html>
